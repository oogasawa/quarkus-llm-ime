# LLM-IME Conversion Daemon

# vLLM server
quarkus.rest-client.vllm.url=http://192.168.5.13:8000
llm-ime.model=/models/llm-jp-3-3.7b-instruct
llm-ime.max-tokens=100
llm-ime.temperature=0.0

# REST client timeout (vLLM can be slow for large completions)
quarkus.rest-client.vllm.read-timeout=30000
quarkus.rest-client.vllm.connect-timeout=5000

# HTTP port (avoid conflict with other services)
quarkus.http.port=8090
